spec_version: 1
name: support_ticket_env
version: "0.1.0"
description: >
  An OpenEnv environment where an AI agent resolves e-commerce customer
  support tickets by issuing structured commands against an in-memory backend.
  Tasks range from simple order status inquiries to complex multi-issue resolutions.

author: support-ticket-team
license: MIT
tags:
  - openenv
  - customer-support
  - reinforcement-learning

type: environment
runtime: docker
app: server.app:app
port: 7860

tasks:
  - id: task_1
    name: Task 1
    difficulty: easy
    max_steps: 10
    grader: env.graders.grader_1:Task1Grader

  - id: task_2
    name: Task 2
    difficulty: medium
    max_steps: 15
    grader: env.graders.grader_2:Task2Grader

  - id: task_3
    name: Task 3
    difficulty: hard
    max_steps: 20
    grader: env.graders.grader_3:Task3Grader
