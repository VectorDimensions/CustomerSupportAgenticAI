spec_version: 1
name: support_ticket_env
version: "0.1.0"
description: >
  An OpenEnv environment where an AI agent resolves e-commerce customer
  support tickets by issuing structured commands against an in-memory backend.
  Tasks range from simple order status inquiries to complex multi-issue resolutions.

author: support-ticket-team
license: MIT
tags:
  - openenv
  - customer-support
  - reinforcement-learning

type: environment
runtime: docker
app: server.app:app
port: 7860

tasks:
  - id: easy
    name: easy
    difficulty: easy
    description: Order status inquiry for ORD-1042. Agent must look up the order and respond with status and delivery info.
    max_steps: 5
    grader:
      type: llm
      prompt_template: "You are evaluating a customer support agent. The agent was asked to resolve an order status inquiry for order ORD-1042. Review the agent's actions and response. Score the agent's performance from 0.0 to 1.0, where 1.0 means the agent looked up the order and provided accurate status and delivery information, and 0.0 means the agent failed to resolve the inquiry. Return only a float between 0.0 and 1.0."

  - id: medium
    name: medium
    difficulty: medium
    description: Refund request for damaged item on ORD-2087. Agent must verify order, check policy, issue correct refund.
    max_steps: 8
    grader:
      type: llm
      prompt_template: "You are evaluating a customer support agent. The agent was asked to process a refund for a damaged item on order ORD-2087 worth $149.99. Review the agent's actions and response. Score the agent's performance from 0.0 to 1.0, where 1.0 means the agent verified the order, checked refund policy, issued the correct refund amount, and sent a professional response, and 0.0 means the agent failed to resolve the request. Return only a float between 0.0 and 1.0."

  - id: hard
    name: hard
    difficulty: hard
    description: Two issues - wrong item in ORD-3021 and billing overcharge on ORD-3022. Agent must resolve both.
    max_steps: 12
    grader:
      type: llm
      prompt_template: "You are evaluating a customer support agent. The agent was asked to resolve two issues: a wrong item received in order ORD-3021 and a $15 billing overcharge on order ORD-3022. Score the agent's performance from 0.0 to 1.0, where 1.0 means the agent resolved both issues (attempted replacement and issued $15 refund) and sent a unified response, and 0.0 means the agent failed to address either issue. Return only a float between 0.0 and 1.0."
